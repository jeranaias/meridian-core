[package]
name = "meridian-stm32-bin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "STM32H7 flight controller binary — Phase 9 MVP firmware"

[features]
default = []
# Canary build: arms rescue flag, inits IWDG, then loops without feeding
# the watchdog. Used to empirically prove the IWDG-reset → bootloader-magic
# → watcher-reflash chain on the same code state we're about to ship for
# real. If the boat doesn't appear in DFU within ~3 seconds of canary boot,
# the chain is broken — abort the iteration.
nettest = []

[dependencies]
meridian-types = { workspace = true }
meridian-hal = { workspace = true }
meridian-comms = { workspace = true }
meridian-platform-stm32 = { workspace = true }
meridian-boardcfg = { workspace = true }

# Hardware deps — only for ARM target
[target.'cfg(target_arch = "arm")'.dependencies]
cortex-m = { version = "0.7", features = ["critical-section-single-core"] }
cortex-m-rt = "0.7"
stm32h7xx-hal = { version = "0.16", features = ["stm32h743v", "rt"] }
defmt = "0.3"
defmt-rtt = "0.4"
panic-probe = { version = "0.3", features = ["print-defmt"] }

[lints]
workspace = true
