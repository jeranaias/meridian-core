<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Route B — Meridian on the Cube</title>
<style>
  :root{
    --bg:#0a0e17; --paper:#10151e; --paper-2:#161d28;
    --ink:#eef2f8; --dim:#7a8a9f; --dim-2:#9fadc0;
    --rule:#1f2a38; --cyan:#22b8ce; --cyan-2:#7ed5e0; --cyan-dim:#0e6a78;
    --safe:#34d399;
    --serif:'Source Serif 4','Source Serif Pro','Iowan Old Style',Georgia,serif;
    --sans:'Inter','Helvetica Neue',system-ui,-apple-system,sans-serif;
    --mono:'JetBrains Mono','Source Code Pro','SF Mono',Menlo,monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;background:var(--bg);color:var(--ink);
    font-family:var(--sans);overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(34,184,206,.08), transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(34,184,206,.05), transparent 50%);
  }
  .stage{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  svg.flow{width:100%;height:100%;max-width:1600px}
  .svg-label{font-family:'Inter',sans-serif;font-weight:600}
  .svg-mono{font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>

<div class="stage">
  <svg class="flow" viewBox="0 0 1600 880" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="cubeGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#22b8ce" stop-opacity=".18"/>
        <stop offset="100%" stop-color="#0e6a78" stop-opacity=".08"/>
      </linearGradient>
      <linearGradient id="layerGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#161d28"/>
        <stop offset="100%" stop-color="#11161f"/>
      </linearGradient>
      <marker id="arrowCyan" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto">
        <path d="M0,0 L12,6 L0,12 Z" fill="#22b8ce"/>
      </marker>
      <marker id="arrowOut" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto">
        <path d="M0,0 L12,6 L0,12 Z" fill="#34d399"/>
      </marker>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="8" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- top header strip -->
    <g>
      <text x="800" y="40" text-anchor="middle" class="svg-mono" font-size="11" fill="#22b8ce" letter-spacing="6">ROUTE B · MERIDIAN ON THE CUBE</text>
      <text x="800" y="68" text-anchor="middle" class="svg-label" font-size="20" fill="#eef2f8" letter-spacing=".5">One firmware. One chip. No middleware between sensor and actuator.</text>
    </g>

    <!-- ============================ ORCA (input) ============================ -->
    <g transform="translate(80,260)">
      <rect width="220" height="320" rx="16" fill="#11161f" stroke="#3b3f4a" stroke-width="1.5"/>
      <rect x="18" y="18" width="184" height="44" rx="7" fill="#161d28"/>
      <text x="110" y="46" text-anchor="middle" class="svg-label" font-size="16" fill="#eef2f8">ORCA CORE 2</text>

      <text x="22" y="92" class="svg-mono" font-size="12" fill="#7a8a9f">— marine gateway</text>
      <line x1="22" y1="108" x2="198" y2="108" stroke="#1f2a38"/>

      <g class="svg-mono" font-size="13" fill="#9fadc0">
        <text x="22" y="138">▸ 10 Hz GNSS</text>
        <text x="22" y="166">▸ 9-axis IMU</text>
        <text x="22" y="194">▸ Depth sounder</text>
        <text x="22" y="222">▸ AIS receiver</text>
        <text x="22" y="250">▸ Wind &amp; heading</text>
        <text x="22" y="278">▸ N2K marine bus</text>
      </g>
    </g>

    <!-- ============================ Connection wire (Orca → Cube) ============================ -->
    <g>
      <line x1="300" y1="420" x2="540" y2="420" stroke="#22b8ce" stroke-width="3" marker-end="url(#arrowCyan)"/>
      <rect x="340" y="392" width="160" height="22" rx="5" fill="#0a0e17" stroke="#0e6a78"/>
      <text x="420" y="408" text-anchor="middle" class="svg-mono" font-size="11" fill="#22b8ce" font-weight="600">UART · NMEA 0183</text>
      <text x="420" y="446" text-anchor="middle" class="svg-mono" font-size="10" fill="#7a8a9f">or CAN · NMEA 2000</text>
    </g>

    <!-- ============================ CUBE / MERIDIAN (centerpiece) ============================ -->
    <g transform="translate(550,140)">
      <!-- outer chip -->
      <rect width="500" height="600" rx="22" fill="url(#cubeGrad)" stroke="#22b8ce" stroke-width="2" filter="url(#glow)"/>

      <!-- chip pins -->
      <g fill="#0e6a78">
        <rect x="-7" y="80" width="7" height="16" rx="1"/>
        <rect x="-7" y="130" width="7" height="16" rx="1"/>
        <rect x="-7" y="180" width="7" height="16" rx="1"/>
        <rect x="-7" y="230" width="7" height="16" rx="1"/>
        <rect x="-7" y="280" width="7" height="16" rx="1"/>
        <rect x="-7" y="330" width="7" height="16" rx="1"/>
        <rect x="-7" y="380" width="7" height="16" rx="1"/>
        <rect x="-7" y="430" width="7" height="16" rx="1"/>
        <rect x="-7" y="480" width="7" height="16" rx="1"/>
        <rect x="500" y="80" width="7" height="16" rx="1"/>
        <rect x="500" y="130" width="7" height="16" rx="1"/>
        <rect x="500" y="180" width="7" height="16" rx="1"/>
        <rect x="500" y="230" width="7" height="16" rx="1"/>
        <rect x="500" y="280" width="7" height="16" rx="1"/>
        <rect x="500" y="330" width="7" height="16" rx="1"/>
        <rect x="500" y="380" width="7" height="16" rx="1"/>
        <rect x="500" y="430" width="7" height="16" rx="1"/>
        <rect x="500" y="480" width="7" height="16" rx="1"/>
      </g>

      <!-- header banner -->
      <rect x="26" y="26" width="448" height="56" rx="9" fill="#0a0e17" stroke="#0e6a78"/>
      <circle cx="50" cy="54" r="7" fill="#22b8ce">
        <animate attributeName="opacity" values="1;.4;1" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <text x="68" y="50" class="svg-label" font-size="14" fill="#22b8ce" letter-spacing="2.5">CUBE PLUS · STM32 H7</text>
      <text x="68" y="68" class="svg-mono" font-size="11" fill="#7a8a9f" letter-spacing="1">MERIDIAN · single Rust firmware · 83 k lines · 1,386 tests</text>

      <!-- stack layers -->
      <g transform="translate(36,108)">
        <!-- Sensor drivers -->
        <rect width="428" height="68" rx="8" fill="url(#layerGrad)" stroke="#1f2a38"/>
        <rect x="0" y="0" width="5" height="68" rx="2" fill="#22b8ce"/>
        <text x="22" y="30" class="svg-label" font-size="14" fill="#eef2f8">Sensor drivers</text>
        <text x="22" y="50" class="svg-mono" font-size="11" fill="#7a8a9f">ICM-42688 · MS5611 · IST8310 · GPS NMEA · uBlox · DroneCAN</text>

        <!-- EKF -->
        <rect y="80" width="428" height="68" rx="8" fill="url(#layerGrad)" stroke="#1f2a38"/>
        <rect x="0" y="80" width="5" height="68" rx="2" fill="#22b8ce"/>
        <text x="22" y="110" class="svg-label" font-size="14" fill="#eef2f8">EKF · 24-state estimator</text>
        <text x="22" y="130" class="svg-mono" font-size="11" fill="#7a8a9f">attitude · velocity · position · gyro &amp; accel bias · GPS fusion</text>

        <!-- Modes / mission / failsafe -->
        <rect y="160" width="428" height="68" rx="8" fill="url(#layerGrad)" stroke="#1f2a38"/>
        <rect x="0" y="160" width="5" height="68" rx="2" fill="#22b8ce"/>
        <text x="22" y="190" class="svg-label" font-size="14" fill="#eef2f8">Modes · Mission · Failsafe · Geofence</text>
        <text x="22" y="210" class="svg-mono" font-size="11" fill="#7a8a9f">MANUAL · HOLD · AUTO · RTL · waypoint engine · GPS-loss landing</text>

        <!-- Bathy + AIS fusion -->
        <rect y="240" width="428" height="68" rx="8" fill="url(#layerGrad)" stroke="#1f2a38"/>
        <rect x="0" y="240" width="5" height="68" rx="2" fill="#34d399"/>
        <text x="22" y="270" class="svg-label" font-size="14" fill="#eef2f8">Bathy filter · AIS landmark fusion</text>
        <text x="22" y="290" class="svg-mono" font-size="11" fill="#34d399">GPS-denied position · CNN matcher · landmark triangulation</text>

        <!-- Control / mixing -->
        <rect y="320" width="428" height="68" rx="8" fill="url(#layerGrad)" stroke="#1f2a38"/>
        <rect x="0" y="320" width="5" height="68" rx="2" fill="#22b8ce"/>
        <text x="22" y="350" class="svg-label" font-size="14" fill="#eef2f8">Control loops · PID · output mixing</text>
        <text x="22" y="370" class="svg-mono" font-size="11" fill="#7a8a9f">attitude rate · position · jet-nozzle steering mix · arming</text>

        <!-- MAVLink + MNP -->
        <rect y="400" width="428" height="68" rx="8" fill="url(#layerGrad)" stroke="#1f2a38"/>
        <rect x="0" y="400" width="5" height="68" rx="2" fill="#22b8ce"/>
        <text x="22" y="430" class="svg-label" font-size="14" fill="#eef2f8">MAVLink &amp; MNP comms</text>
        <text x="22" y="450" class="svg-mono" font-size="11" fill="#7a8a9f">USB CDC · UART · radio · tablet bridge · COBS framing</text>
      </g>
    </g>

    <!-- ============================ Outputs (right) ============================ -->
    <g>
      <!-- to ESC -->
      <line x1="1050" y1="320" x2="1320" y2="320" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrowOut)"/>
      <text x="1185" y="306" text-anchor="middle" class="svg-mono" font-size="11" fill="#34d399" font-weight="600">PWM · 50 Hz</text>

      <rect x="1320" y="280" width="200" height="80" rx="12" fill="#11161f" stroke="#34d399" stroke-width="1.5"/>
      <text x="1420" y="316" text-anchor="middle" class="svg-label" font-size="16" fill="#eef2f8">ESC + RUDDER</text>
      <text x="1420" y="338" text-anchor="middle" class="svg-mono" font-size="11" fill="#34d399">jet-nozzle steering</text>

      <!-- to tablet -->
      <line x1="1050" y1="520" x2="1320" y2="520" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrowOut)"/>
      <text x="1185" y="506" text-anchor="middle" class="svg-mono" font-size="11" fill="#34d399" font-weight="600">MNP · radio</text>

      <rect x="1320" y="480" width="200" height="80" rx="12" fill="#11161f" stroke="#34d399" stroke-width="1.5"/>
      <text x="1420" y="516" text-anchor="middle" class="svg-label" font-size="16" fill="#eef2f8">TABLET GCS</text>
      <text x="1420" y="538" text-anchor="middle" class="svg-mono" font-size="11" fill="#34d399">mission.html · operator</text>
    </g>

    <!-- ============================ Bottom legend ============================ -->
    <g transform="translate(80,820)">
      <text x="0" y="0" class="svg-mono" font-size="10" fill="#7a8a9f" letter-spacing="2">INPUT</text>
      <line x1="0" y1="14" x2="60" y2="14" stroke="#22b8ce" stroke-width="2.5"/>
      <text x="70" y="18" class="svg-mono" font-size="11" fill="#9fadc0">marine sensor data</text>

      <text x="280" y="0" class="svg-mono" font-size="10" fill="#7a8a9f" letter-spacing="2">OUTPUT</text>
      <line x1="280" y1="14" x2="340" y2="14" stroke="#34d399" stroke-width="2.5"/>
      <text x="350" y="18" class="svg-mono" font-size="11" fill="#9fadc0">control + telemetry</text>

      <text x="560" y="0" class="svg-mono" font-size="10" fill="#7a8a9f" letter-spacing="2">DIFFERENTIATOR</text>
      <rect x="560" y="8" width="12" height="12" rx="2" fill="#34d399"/>
      <text x="580" y="18" class="svg-mono" font-size="11" fill="#9fadc0">GPS-denied navigation layer</text>
    </g>
  </svg>
</div>

</body>
</html>
